[astra]
requires-astra = ">=0.5.2"

[project]
name = "ColorLUT_K"
version = "0.1.0"
author = "Korarei"

[build]
[[build.plugins]]
id = "lut"
variables = { SOURCE = "./src" }

[build.plugins.release]
commands = [
    "cmake -S \"${SOURCE}\" -B \"${BUILD_DIRECTORY}/Release\" -G Ninja -DCMAKE_BUILD_TYPE=Release -DVERSION=${PROJECT_VERSION}",
    "cmake -E copy \"${BUILD_DIRECTORY}/Release/compile_commands.json\" \"${SOURCE}\"",
    "cmake --build \"${BUILD_DIRECTORY}/Release\"",
]
artifacts = ["${BUILD_DIRECTORY}/Release/*.aux2"]

[build.plugins.debug]
commands = [
    "cmake -S \"${SOURCE}\" -B \"${BUILD_DIRECTORY}/Debug\" -G Ninja -DCMAKE_BUILD_TYPE=Debug",
    "cmake -E copy \"${BUILD_DIRECTORY}/Debug/compile_commands.json\" \"${SOURCE}\"",
    "cmake --build \"${BUILD_DIRECTORY}/Debug\"",
]
artifacts = ["${BUILD_DIRECTORY}/Debug/*.aux2"]

[release]
[release.package]
information = "${PROJECT_NAME} v${PROJECT_VERSION} by ${PROJECT_AUTHOR}"
license = "MIT"
website = "https://github.com/korarei/AviUtl2_ColorLUT_K_Plugin"
report-issue = "https://github.com/korarei/AviUtl2_ColorLUT_K_Plugin/issues"
summary = "AviUtl ExEdit2でLUTファイルを扱えるようにするプラグイン"
description = """
以下の機能が追加される
- 色調整 -> ColorLUT_K: LUTファイルを用いた色調補正
- LUT -> HaldCLUT_K: Hald CLUT (画像形式のLUT) のメディアオブジェクト
- ファイル -> ファイル出力 -> LUTファイル出力: 画像をLUTファイルに変換し出力する
- ファイルドロップ -> LUTフィルタをレイヤーに追加: LUTファイルをD&Dでレイヤーに追加する
"""

[[release.contents.extensions]]
directory = "Plugin/${PROJECT_NAME}"
files = ["plugin:lut"]

[[release.contents.documents]]
directory = "Plugin/${PROJECT_NAME}"
files = ["./*.md", "./LICENSE"]
