[astra]
requires-astra = ">=0.6.2"

[project]
name = "ColorLUT_K"
version = "0.1.0"
author = "Korarei"

[build]
[[build.plugins]]
id = "lut"
shell = "pwsh"

[build.plugins.release]
commands = '''
$src = "./src"
cmake -S "$src" -B "$env:BUILD_DIRECTORY/Release" -G Ninja -DCMAKE_BUILD_TYPE=Release -DVERSION="$env:PROJECT_VERSION"
cp "$env:BUILD_DIRECTORY/Release/compile_commands.json" "$src"
cmake --build "$env:BUILD_DIRECTORY/Release"
'''
artifacts = ["${BUILD_DIRECTORY}/Release/*.aux2"]

[build.plugins.debug]
commands = '''
$src = "./src"
cmake -S "$src" -B "$env:BUILD_DIRECTORY/Debug" -G Ninja -DCMAKE_BUILD_TYPE=Debug
cp "$env:BUILD_DIRECTORY/Debug/compile_commands.json" "$src"
cmake --build "$env:BUILD_DIRECTORY/Debug"
'''
artifacts = ["${BUILD_DIRECTORY}/Debug/*.aux2"]

[release]
[release.package]
information = "${PROJECT_NAME} v${PROJECT_VERSION} by ${PROJECT_AUTHOR}"
license = "MIT"
website = "https://github.com/korarei/AviUtl2_ColorLUT_K_Plugin"
report-issue = "https://github.com/korarei/AviUtl2_ColorLUT_K_Plugin/issues"
summary = "AviUtl ExEdit2でLUTファイルを扱えるようにするプラグイン"
description = """
以下の機能が追加される
- 色調整 -> ColorLUT_K: LUTファイルを用いた色調補正
- LUT -> HaldCLUT_K: Hald CLUT (画像形式のLUT) のメディアオブジェクト
- ファイル -> ファイル出力 -> LUTファイル出力: 画像をLUTファイルとして出力する
- ファイルドロップ -> LUTフィルタをレイヤーに追加: LUTファイルをD&Dでレイヤーに追加する
"""

[[release.contents.extensions]]
directory = "Plugin/${PROJECT_NAME}"
files = ["plugin:lut"]

[[release.contents.documents]]
directory = "Plugin/${PROJECT_NAME}"
files = ["./*.md", "./LICENSE"]
