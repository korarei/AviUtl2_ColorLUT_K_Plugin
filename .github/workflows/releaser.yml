name: releaser

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    outputs:
      name: ${{ steps.compress.outputs.name }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build
      working-directory: src
      run: |
        $version = $env:GITHUB_REF_NAME -replace '^v', ''
        if ($version -notmatch '^\d+\.\d+\.\d+') { $version = "0.0.0" }

        cmake -S . -B build/release -G Ninja -DCMAKE_BUILD_TYPE=Release -DVERSION="$version"
        cmake --build build/release

    - name: Compress
      id: compress
      run: |
        $env:GITHUB_REPOSITORY.Split('/')[-1] -match 'AviUtl2?_(.*)_(Plugin|Script)' | Out-Null; $name = $matches[1]
        "name=${name}_$env:GITHUB_REF_NAME" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

        $dst = "artifacts"
        $root = "$dst/package"
        $plugin = "$root/Plugin/$name"
        $archive = "$dst/${name}.au2pkg.zip"

        mkdir $plugin -Force

        Copy-Item src/build/release/*.aux2 $plugin -Force
        Copy-Item *.md $plugin -Force
        Copy-Item LICENSE $plugin -Force

        $contents = @(
            "[ ${name} ]",
            "",
            "Version: ${env:GITHUB_REF_NAME}",
            "Author: KORAREI",
            "License: MIT",
            "",
            "以下の機能が追加される",
            "- ColorLUT_K (色調整): LUTファイルを読み込み映像の色を調整",
            "- HaldCLUT_K (LUT): Hald CLUTのメディアオブジェクト",
            "- LUTファイル出力: 画像からLUTをエクスポート",
            "- LUTフィルタをレイヤーに追加: LUTファイルをD&Dでレイヤー追加",
        )
        $contents -join "`r`n" | Set-Content -Path "$root/package.txt" -Encoding utf8 -Force
        "[package]`r`nid=${name}`r`nname=${name}" | Set-Content -Path "$root/package.ini" -Encoding utf8 -Force

        Compress-Archive -Path "$root/*" -DestinationPath $archive -Force

        "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Attest
      uses: actions/attest-build-provenance@v3
      with:
        subject-path: ${{ steps.compress.outputs.archive }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: plugin
        path: ${{ steps.compress.outputs.archive }}
        compression-level: 0

  releaser:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: plugin
        path: artifacts

    - name: Create notes
      run: |
        $changelog = Get-Content CHANGELOG.md -Raw -Encoding utf8

        $changelog -match '(?ms)^##\s+.*?(?=^##\s+|\z)'
        $section = $matches[0] -replace '^##.*', "## What's Changed"

        Set-Content release_notes.md $section.TrimEnd() -Encoding utf8

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ needs.build.outputs.name }}
        files: 'artifacts/*.zip'
        body_path: release_notes.md
